protocols = imap

# Listen on all interfaces, plain IMAP only (test environment)
listen = *

# Plain-text auth allowed (no SSL needed for local testing)
ssl = no
disable_plaintext_auth = no
auth_mechanisms = plain login

# Maildir storage per user
mail_location = maildir:/home/%u/Maildir

# Auth: passwd-file for test users
passdb {
  driver = passwd-file
  args = scheme=PLAIN /etc/dovecot/users
}
userdb {
  driver = passwd-file
  args = /etc/dovecot/users
}

service imap-login {
  inet_listener imap {
    port = 143
  }
  # Disable IMAPS
  inet_listener imaps {
    port = 0
  }
}

# Log to stdout for Docker
log_path = /dev/stdout
info_log_path = /dev/stdout
