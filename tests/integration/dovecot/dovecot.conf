protocols = imap imaps

# Listen on all interfaces
listen = *

# SSL/TLS configuration – TLS 1.2 minimum (acceptance criterion)
ssl = yes
ssl_cert = </etc/dovecot/dovecot.pem
ssl_key = </etc/dovecot/private/dovecot.pem
ssl_min_protocol = TLSv1.2

# Allow plain-text auth over plain IMAP (port 143) for local dev convenience.
# Over IMAPS (port 993) auth is always encrypted by the TLS layer.
disable_plaintext_auth = no
auth_mechanisms = plain login

# Maildir storage per user
mail_location = maildir:/home/%u/Maildir

# Auth: passwd-file for test users
passdb {
  driver = passwd-file
  args = scheme=PLAIN /etc/dovecot/users
}
userdb {
  driver = passwd-file
  args = /etc/dovecot/users
}

service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

# Log to stdout for Docker
log_path = /dev/stdout
info_log_path = /dev/stdout
